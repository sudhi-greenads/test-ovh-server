# Default values for campaign-management.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.gitlab.com/greenads-global/ga-campaign-manager-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v1.19.1"

imagePullSecrets:
  - name: "reg-creds-gitlab"
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 5028

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    cert-manager.io/acme-challenge-type: http01
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: onetest.telinfy.com
      paths:
        - path: /telinfy-gcms(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: onetest-cert-manager-certificate
      hosts:
        - onetest.telinfy.com
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

env:
  port: 5028
  access_token_expiry: 3600
  refresh_token_expiry: 15778476
  ga_cloudapi_inbound_service_base_url: https://api.prod.telinfy.net/gwis/
  # redis
  attempts: 5
  min_delay: 3000
  times_connected: 3
  campaign_message_sending_interval: 30
  ga_user_account_base_url: http://telinfy-application-user-account.telinfy-application:5000
  whatsapp_business_end_url: /whatsapp-business/find
  get_user_end_url: /users
  get_api_key_end_url: /users/api-key
  ga_s3_adapter_base_url: http://telinfy-application-s3-adapter.telinfy-application:5009
  media_download_end_url: /adapter/s3/whatsapp-media/save
  ga_receiver_profile_base_url: http://telinfy-application-receiver-profile.telinfy-application:5002
  graph_base_url: https://graph.facebook.com/v15.0
  graph_message_end_url: /messages
  graph_template_end_url: /message_templates
  graph_phone_number_end_url: /phone_numbers
  chatbot_session_expiry_time: 3600
  s3_aws_arn: arn:aws:s3:::telinfy.greenadsglobal.com
  aws_bucket_name: telinfy.greenadsglobal.com
  aws_bucket_region: ap-south-1
  s3_file_base_url: https://s3.ap-south-1.amazonaws.com/telinfy.greenadsglobal.com
  intrcity_whatsapp_business_id: 46c9410b-c345-4e86-ae3b-9281045f3d75
  msg_bucket_size: 1000000
  message_load_distribution_cron: "*/5 * * * * *"
  message_schedule_distribution_load_cron: "*/5 * * * * *"
  campaign_message_status_cron: "*/30 * * * * *"
  message_bucket_index_cron: "*/5 * * * *"
  message_bucket_sync_cron: "*/5 * * * *"
  multi_channel_campaign_cron: "*/1 * * * *"

  # message bucket index deletion offset
  message_bucket_index_deletion_offset: 999999

  instance_namespace: telinfy-ent-grp-1001

  # log flag
  log_file_enabled: false

  # greenads email auth credentials
  email_service_username: Greenads_email
  email_service_password: "@C@g202525"

  # greenads email service
  email_service_url: https://5ywz6g.api-in.infobip.com/email/3/send
  from_mail: dev@telinfy.com

  # account ids for campaign creation mail notification
  account_ids_for_campaign_creation_mail_notification: "c99e3cc4-ce85-421b-8df4-ff3bc7472028,c3d9973c-ba49-4427-9044-d21fed9971aa,eb034627-52bf-4d65-aab5-8cebcf109cdc,5e035c7c-eb73-4bf2-b955-4c5dfc261e35,5bf5f56e-b33e-4079-af03-ba98a45cafd8,143cd6a9-0794-4d85-be0a-6088b3922bb9,11023607-d8ba-411b-8c78-3ea88ab3b972,d1f23dd6-22b4-46fc-93bd-20fe1d2abbfd,8bd214a1-e89a-47ab-8cf5-727bf97f39cc,13877ba7-7c68-427c-90ff-ed279e0ea478,07027eab-5f39-43a3-ac60-d6948ce3aa19,0ebb752d-f5ed-4131-953e-1a1964ba3066,21eae138-4e79-453c-92fe-dee5f4c192da,cb528165-ee5e-47b3-b6f6-01aa22dce06e,1e45f1a4-07fd-4512-b4f8-1c9146cadd0b,a096983b-d101-4c26-80df-8a207686b0e5,2461c6a3-0540-41fd-af88-df486e9b5c4c,d6f66200-21d9-4bd4-8411-6b5951bd485d,aeec89d4-f9f0-489f-9945-77d91d55d308,4027b3ed-6511-40d3-b5a5-a3f37636b50d,545be280-ea38-4565-ae45-cc23a4523176"

