# Default values for integrations.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.gitlab.com/greenads-global/ga-integrations-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v1.0.8"

imagePullSecrets:
  - name: "reg-creds-gitlab"
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 5100

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    cert-manager.io/acme-challenge-type: http01
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: onetest.telinfy.com
      paths:
        - path: /gint(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: onetest-cert-manager-certificate
      hosts:
        - onetest.telinfy.com
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

env:
  port: 5100
  node_env: "production"
  encryption_key: "a26f9f13b8d5fb5faddb39d2d1e39916cbf310a6f79cff141319c0ed69f3381f"
  webhook_secret: "3b55b83a7549927d362105a100d383cb335712c45e7ad3fe154b4975f52db859"
  garp_url: https://api.prod.telinfy.net/garp
nodeSelector: {}

tolerations: []

affinity: {}
