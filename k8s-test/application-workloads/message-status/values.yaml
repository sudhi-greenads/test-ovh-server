# Default values for message-status.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.gitlab.com/greenads-global/ga-message-status-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v1.9.1"

imagePullSecrets:
  - name: "reg-creds-gitlab"
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 5032

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    cert-manager.io/acme-challenge-type: http01
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: onetest.telinfy.com
      paths:
        - path: /message-status(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: onetest-cert-manager-certificate
      hosts:
        - onetest.telinfy.com
resources: {}
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

env:
  port: 5032

  access_token_expiry: 3600
  refresh_token_expiry: 15778476

  ga_cloudapi_inbound_service_base_url: https://api.prod.telinfy.net/gwis/

  # redis
  attempts: 5
  min_delay: 3000
  times_connected: 3

  ga_user_account_base_url: http://telinfy-application-user-account.telinfy-application:5000
  whatsapp_business_end_url: /whatsapp-business/find
  get_user_end_url: /users
  get_api_key_end_url: /users/api-key

  ga_s3_adapter_base_url: http://telinfy-application-s3-adapter.telinfy-application:5009 #correct this after deploying the service
  media_download_end_url: /adapter/s3/whatsapp-media/save

  ga_receiver_profile_base_url: http://telinfy-application-receiver-profile.telinfy-application:5002

  graph_base_url: https://graph.facebook.com/v15.0
  graph_message_end_url: /messages
  graph_template_end_url: /message_templates
  graph_phone_number_end_url: /phone_numbers

  chatbot_session_expiry_time: 3600

  s3_aws_arn: arn:aws:s3:::telinfy.greenadsglobal.com
  aws_bucket_name: telinfy.greenadsglobal.com
  aws_bucket_region: ap-south-1
  s3_file_base_url: https://s3.ap-south-1.amazonaws.com/telinfy.greenadsglobal.com

  intrcity_whatsapp_business_id: 46c9410b-c345-4e86-ae3b-9281045f3d75

  msg_bucket_size: 1000000
  # Cloud enabled
  cloud_enabled: true

  # Gupshup enabled
  gupshup_enabled: true

  message_load_distribution_cron: "* * * * *"
  message_schedule_distribution_load_cron: "* * * * *"

  # channel prefetch variables
  message_status_channel_prefetch: 100
  message_status_bulk_update_channel_prefetch: 1

  # mq batch size
  mq_batch_size: 2000

  # message status lock cron job expression
  message_status_lock_cron: "*/15 * * * * *"

  # campaign selection interval
  campaign_status_fetch_interval: 3

  # campaign message sending interval
  campaign_message_sending_interval: 30

  message_status_bulk_update_threshold: 10

  # log flag
  log_file_enabled: false

nodeSelector: {}

tolerations: []

affinity: {}
