# Default values for rcs.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.gitlab.com/greenads-global/ga-rcs-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v1.0.15"

imagePullSecrets:
  - name: "reg-creds-gitlab"
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 5036

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    cert-manager.io/acme-challenge-type: http01
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: onetest.telinfy.com
      paths:
        - path: /gars(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: onetest-cert-manager-certificate
      hosts:
        - onetest.telinfy.com
resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

env:
  port: 5036
  access_token_expiry: 3600
  refresh_token_expiry: 15778476
  # redis
  attempts: 5
  min_delay: 3000
  times_connected: 3
  ga_user_account_base_url: http://telinfy-application-user-account.telinfy-application:5000
  whatsapp_business_end_url: /whatsapp-business/find
  get_user_end_url: /users
  get_api_key_end_url: /users/api-key
  get_all_users: /accounts/me/all/users
  ga_receiver_profile_base_url: http://telinfy-application-receiver-profile.telinfy-application:5002
  rcs_base_url: https://rcs.telinfy.com/rcswebapi
  rcs_message_status_update_cron: "*/5 * * * *"
  rcs_multi_campaign_message_status_update_cron: "*/5 * * * * "

nodeSelector: {}

tolerations: []

affinity: {}
