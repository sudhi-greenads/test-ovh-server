# Default values for message-execution.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.gitlab.com/greenads-global/ga-message-execution-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v2.13.0"

imagePullSecrets:
  - name: "reg-creds-gitlab"
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 5031

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    cert-manager.io/acme-challenge-type: http01
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: onetest.telinfy.com
      paths:
        - path: /message-execution(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: onetest-cert-manager-certificate
      hosts:
        - onetest.telinfy.com
resources: {}
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

env:
  port: 5031

  access_token_expiry: 3600
  refresh_token_expiry: 15778476

  ga_cloudapi_inbound_service_base_url: https://api.prod.telinfy.net/gwis/

  # redis
  attempts: 5
  min_delay: 3000
  times_connected: 3

  ga_user_account_base_url: http://telinfy-application-user-account.telinfy-application:5000
  whatsapp_business_end_url: /whatsapp-business/find
  get_user_end_url: /users
  get_api_key_end_url: /users/api-key

  ga_s3_adapter_base_url: http://telinfy-application-s3-adapter.telinfy-application:5009
  media_download_end_url: /adapter/s3/whatsapp-media/save

  ga_receiver_profile_base_url: http://telinfy-application-receiver-profile.telinfy-application:5002

  graph_base_url: https://graph.facebook.com/v15.0
  graph_message_end_url: /messages

  s3_aws_arn: arn:aws:s3:::telinfy.greenadsglobal.com
  aws_bucket_name: telinfy.greenadsglobal.com
  aws_bucket_region: ap-south-1
  s3_file_base_url: https://s3.ap-south-1.amazonaws.com/telinfy.greenadsglobal.com

  max_tps_limit: 50

  # Gupshup base url
  gupshup_base_url: https://api.gupshup.io/wa/api/v1

  # Gupshup template end url
  gupshup_template_end_url: /template/list

  # Cloud enabled
  cloud_enabled: true

  # Gupshup enabled
  gupshup_enabled: true

  # RCS enabled
  rcs_enabled: true

  # Subscription service base url
  ga_subscription_service_base_url: http://telinfy-application-subscription.telinfy-application:5033

  # Subscription unit charge end url
  subscription_unit_charge_end_url: /unitcharge

  # Channel prefetch variables
  gupshup_campaign_message_execute: 100
  cloud_campaign_message_execute: 100
  rcs_campaign_message_execute: 1
  mq_batch_size: 100

  campaign_ids_to_reject: "a02a38e7-c317-4600-87e8-e44fb6c2078c,a02a38e7-c317-4600-87e8-e44fb6csfdsdfsd"

  # log flag
  log_file_enabled: false

  # RCS base url
  rcs_base_url: https://rcs.telinfy.com/rcswebapi

nodeSelector: {}

tolerations: []

affinity: {}
