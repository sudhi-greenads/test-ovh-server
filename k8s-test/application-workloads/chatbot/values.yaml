# Default values for chatbot.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.gitlab.com/greenads-global/ga-chatbot-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v1.18.4"

imagePullSecrets:
  - name: "reg-creds-gitlab"
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 5034

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    cert-manager.io/acme-challenge-type: http01
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: onetest.telinfy.com
      paths:
        - path: /gacb(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: onetest-cert-manager-certificate
      hosts:
        - onetest.telinfy.com
resources: {}
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

env:
  port: 5034
  access_token_expiry: 3600
  refresh_token_expiry: 15778476
  # redis
  attempts: 5
  min_delay: 3000
  times_connected: 3
  campaign_message_sending_interval: 30
  ga_user_account_base_url: http://telinfy-application-user-account.telinfy-application:5000
  whatsapp_business_end_url: /whatsapp-business/find
  get_user_end_url: /users
  get_api_key_end_url: /users/api-key
  ga_s3_adapter_base_url: http://telinfy-application-s3-adapter.telinfy-application:5009 #correct this after deploying the service
  media_download_end_url: /adapter/s3/whatsapp-media/save
  s3_aws_arn: arn:aws:s3:::telinfy.greenadsglobal.com
  aws_bucket_name: telinfy.greenadsglobal.com
  aws_bucket_region: ap-south-1
  s3_file_base_url: https://s3.ap-south-1.amazonaws.com/telinfy.greenadsglobal.com

  chatbot_session_timeout_cron: "*/5 * * * *"
  chatbot_session_timeout_cron_enabled: "true"

  new_edge_channel_id: ab68b945-ca7c-4fbe-84c0-aff5638197a9
  new_edge_custom_api_url: https://newedgerealty--devorg.sandbox.my.salesforce-sites.com/services/apexrest/leadsdata/whatsapp

  reseller_id: 15
  # log flag
  log_file_enabled: false

nodeSelector: {}

tolerations: []

affinity: {}
