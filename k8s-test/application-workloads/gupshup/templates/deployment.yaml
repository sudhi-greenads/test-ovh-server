apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gupshup.fullname" . }}
  labels:
    {{- include "gupshup.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gupshup.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gupshup.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gupshup.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: "{{ .Values.env.port }}"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: jwt_secret
            - name: DATABASEURL
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: gupshupdburl
            - name: DATABASE_RO
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: gupshupdburl
            - name: SUBSCRIPTION_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: subscriptiondburl
            - name: SUBSCRIPTION_DATABASE_RO
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: subscriptiondburl
            - name: USER_ACCOUNT_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: useraccountdburl
            - name: ACCESS_TOKEN_EXPIRY
              value: "{{ .Values.env.access_token_expiry }}"
            - name: REFRESH_TOKEN_EXPIRTY
              value: "{{ .Values.env.refresh_token_expiry }}"
            - name: AMQP_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: amqp_server_url
            - name: CAMPAIGN_MESSAGE_SENDING_INTERVAL
              value: "{{ .Values.env.campaign_message_sending_interval }}"
            - name: GA_USER_ACCOUNT_BASE_URL
              value: {{ .Values.env.ga_user_account_base_url }}
            - name: WHATSAPP_BUSINESS_END_URL
              value: {{ .Values.env.whatsapp_business_end_url }}
            - name: GET_USER_END_URL
              value: {{ .Values.env.get_user_end_url }}
            - name: GET_API_KEY_END_URL
              value: {{ .Values.env.get_api_key_end_url }}
            - name: GET_ALL_USERS
              value: {{ .Values.env.get_all_users }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: redisurl
            - name: ATTEMPTS
              value: "{{ .Values.env.attempts }}"
            - name: MIN_DELAY
              value: "{{ .Values.env.min_delay }}"
            - name: TIMES_CONNECTED
              value: "{{ .Values.env.times_connected }}"
            - name: WHATSAPP_BUSINESS_END_URL
              value: {{ .Values.env.whatsapp_business_end_url }}
            - name: GET_USER_END_URL
              value: {{ .Values.env.get_user_end_url }}
            - name: GA_RECEIVER_PROFILE_BASE_URL
              value: {{ .Values.env.ga_receiver_profile_base_url }}
            - name: GUPSHUP_BASE_URL
              value: {{ .Values.env.gupshup_base_url }}
            - name: GUPSHUP_SM_BASE_URL
              value: {{ .Values.env.gupshup_sm_base_url }}
            - name: GUPSHUP_TEMPLATE_END_URL
              value: {{ .Values.env.gupshup_template_end_url }}
            - name: GUPSHUP_TEMPLATE_MESSAGE_END_URL
              value: {{ .Values.env.gupshup_template_message_end_url }}
            - name: GUPSHUP_DIRECT_MESSAGE_END_URL
              value: {{ .Values.env.gupshup_direct_message_end_url }}
            - name: GA_GUPSHUP_INBOUND_SERVICE_BASE_URL
              value: {{ .Values.env.ga_gupshup_inbound_service_base_url }}
            - name: GUPSHUP_PARTNER_BASE_URL
              value: {{ .Values.env.gupshup_partner_base_url }}
            - name: GUPSHUP_PARTNER_TOKEN_END_URL
              value: {{ .Values.env.gupshup_partner_token_end_url }}
            - name: GUPSHUP_PARTNER_APP_CREATION_END_URL
              value: {{ .Values.env.gupshup_partner_app_creation_end_url }}
            - name: GUPSHUP_PARTNER_APP_SIGNED_LINK_END_URL
              value: {{ .Values.env.gupshup_partner_app_signed_link_end_url }}
            - name: GUPSHUP_PARTNER_EMAIL
              value: {{ .Values.env.gupshup_partner_email }}
            - name: GUPSHUP_PARTNER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: gupshup_partner_password
            - name: GUPSHUP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: gupshup_api_key
            - name: AWS_ARN
              value: {{ .Values.env.aws_arn }}
            - name: AWS_BUCKET_NAME
              value: {{ .Values.env.aws_bucket_name }}
            - name: AWS_BUCKET_REGION
              value: {{ .Values.env.aws_bucket_region }}
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: aws_access_key
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: aws_secret_key
            - name: S3_FILE_BASE_URL
              value: {{ .Values.env.s3_file_base_url }}
            - name: GA_SUBSCRIPTION_SERVICE_BASE_URL
              value: {{ .Values.env.ga_subscription_service_base_url }}
            - name: SUBSCRIPTION_UNIT_CHARGE_END_URL
              value: {{ .Values.env.subscription_unit_charge_end_url }}
            - name: KITCHEN_TREASURES_CHANNEL_ID
              value: {{ .Values.env.kitchen_treasures_channel_id }}
            - name: KITCHEN_TREASURES_TEMPLATE_NAME
              value: {{ .Values.env.kitchen_treasures_template_name }}
            - name: KITCHEN_TREASURES_RCS_API_BASE_URL
              value: {{ .Values.env.kitchen_treasures_rcs_api_base_url }}
            - name: KITCHEN_TREASURES_RCS_API_END_URL
              value: {{ .Values.env.kitchen_treasures_rcs_api_end_url }}
            - name: KITCHEN_TREASURES_RCS_API_USERNAME
              value: {{ .Values.env.kitchen_treasures_rcs_api_username }}
            - name: KITCHEN_TREASURES_RCS_API_PASSWORD
              value: "{{ .Values.env.kitchen_treasures_rcs_api_password }}"
            - name: KITCHEN_TREASURES_RCS_API_SENDER_NAME
              value: {{ .Values.env.kitchen_treasures_rcs_api_sender_name }}
            - name: KITCHEN_TREASURES_RCS_API_UC
              value: {{ .Values.env.kitchen_treasures_rcs_api_uc }}
            - name: KITCHEN_TREASURES_RCS_API_ROUTE_TYPE
              value: "{{ .Values.env.kitchen_treasures_rcs_api_route_type }}"
            - name: KITCHEN_TREASURES_RCS_API_TID
              value: "{{ .Values.env.kitchen_treasures_rcs_api_tid }}"
            - name: SAFG_CHANNEL_ID
              value: {{ .Values.env.safg_channel_id }}
            - name: SAFG_TEMPLATE_NAME
              value: {{ .Values.env.safg_template_name }}
            - name: SAFG_RCS_API_SENDER_NAME
              value: {{ .Values.env.safg_rcs_api_sender_name }}
            - name: SAFG_RCS_API_ROUTE_TYPE
              value: "{{ .Values.env.safg_rcs_api_route_type }}"
            - name: SAFG_RCS_API_TID
              value: "{{ .Values.env.safg_rcs_api_tid }}"
            - name: SAFG_RCS_API_KEY
              value: "{{ .Values.env.safg_rcs_api_key }}"
            - name: LOG_FILE_ENABLED
              value: "{{ .Values.env.log_file_enabled }}"
            - name: GRAPH_BASE_URL
              value: "{{ .Values.env.graph_base_url }}"
            - name: GRAPH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: graph_client_id
            - name: GRAPH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: graph_client_secret
            - name: GRAPH_SYSTEM_USER_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: graph_system_user_access_token
            - name: AGENT_UNASSIGNMENT_CRON
              value: "{{ .Values.env.agent_unassignment_cron }}"
            - name: AGENT_UNASSIGNMENT_RESELLER_ID
              value: "{{ .Values.env.agent_unassignment_reseller_id }}"
            - name: SESSION_CHECK_RESELLER_ID
              value: "{{ .Values.env.session_check_reseller_id }}"
            - name: TEMPLATE_CREATION_KEY
              value: "{{ .Values.env.template_creation_key }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            initialDelaySeconds: 200
            httpGet:
              path: /
              port: http
          readinessProbe:
            initialDelaySeconds: 200
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
