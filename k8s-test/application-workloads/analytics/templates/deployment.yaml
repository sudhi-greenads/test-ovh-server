apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "analytics.fullname" . }}
  labels:
    {{- include "analytics.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "analytics.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "analytics.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "analytics.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: "{{ .Values.env.port }}"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: jwt_secret
            - name: DATABASEURL
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: analyticsdburl
            - name: CLOUD_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: cloudapidburl
            - name: CLOUD_DATABASE_RO
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: cloudapidburl
            - name: RCS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: rcsdburl
            - name: CAMPAIGN_DATABASE_RO
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: campaignmanagerdburl
            - name: TELINFY_CAMPAIGN_DATABASE_RO
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: campaignmanagerdburl
            - name: GUPSHUP_DATABASE_RO
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: gupshupdburl
            - name: GUPSHUP_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: gupshupdburl
            - name: ENTERPRISE_DATABASE_RO
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: campaignmanagerdburl
            - name: CHATBOT_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: chatbotdburl
            - name: CHATBOT_DATABASE_RO
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: chatbotdburl
            - name: USER_DATABASE_RO
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: useraccountdburl
            - name: EMAIL_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: email_service_url
            - name: EMAIL_SERVICE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: email_service_username
            - name: EMAIL_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: email_service_password
            - name: FROM_MAIL
              value: "{{ .Values.env.from_mail }}"
            - name: ACCESS_TOKEN_EXPIRY
              value: "{{ .Values.env.access_token_expiry }}"
            - name: REFRESH_TOKEN_EXPIRTY
              value: "{{ .Values.env.refresh_token_expiry }}"
            - name: AMQP_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: amqp_server_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: redisurl
            - name: ATTEMPTS
              value: "{{ .Values.env.attempts }}"
            - name: MIN_DELAY
              value: "{{ .Values.env.min_delay }}"
            - name: TIMES_CONNECTED
              value: "{{ .Values.env.times_connected }}"
            - name: GRAPH_BASE_URL
              value: {{ .Values.env.graph_base_url }}
            - name: MESSAGE_END_URL
              value: {{ .Values.env.graph_message_end_url }}
            - name: TEMPLATE_END_URL
              value: {{ .Values.env.graph_template_end_url }}
            - name: PHONE_NUMBER_END_URL
              value: {{ .Values.env.graph_phone_number_end_url }}
            - name: AWS_ARN
              value: {{ .Values.env.s3_aws_arn }}
            - name: AWS_BUCKET_NAME
              value: {{ .Values.env.aws_bucket_name }}
            - name: AWS_BUCKET_REGION
              value: {{ .Values.env.aws_bucket_region }}
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: aws_access_key
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: aws_secret_key
            - name: S3_FILE_BASE_URL
              value: {{ .Values.env.s3_file_base_url }}
            - name: GA_USER_ACCOUNT_BASE_URL
              value: {{ .Values.env.ga_user_account_base_url }}
            - name: GET_API_KEY_END_URL
              value: {{ .Values.env.get_api_key_end_url }}
            - name: MESSAGE_THRESHOLD_FOR_REPORT
              value: "{{ .Values.env.message_threshold_for_report }}"
            - name: MISSION_ZERO_BOT_CONFIGURATION_ID
              value: {{ .Values.env.mission_zero_bot_configuration_id }}
            - name: OXYGEN_BOT_CONFIGURATION_ID
              value: {{ .Values.env.oxygen_bot_configuration_id }}
            - name: WONDERLA_BOT_CONFIGURATION_ID
              value: {{ .Values.env.wonderla_bot_configuration_id }}
            - name: PS_JEWELLERS_BOT_CONFIGURATION_ID
              value: {{ .Values.env.ps_jewellers_bot_configuration_id }}
            - name: ENTERPRISE_ACCOUNTS
              value: {{ .Values.env.enterprise_accounts }}
            - name: CAMPAIGN_MESSAGE_CHUNK
              value: "{{ .Values.env.campaign_message_chunk }}"
            - name: MESSAGE_REPORT_V4_PREFETCH
              value: "{{ .Values.env.message_report_v4_prefetch }}"
            - name: CONVERSATION_MESSAGE_REPORT_V4_PREFETCH
              value: "{{ .Values.env.conversation_message_report_v4_prefetch }}"
            - name: CHATBOT_REPORT_PREFETCH
              value: "{{ .Values.env.chatbot_report_prefetch }}"
            - name: BHIMA_REPORT_CRON_ENABLED
              value: "{{ .Values.env.bhima_report_cron_enabled }}"
            - name: BHIMA_WHATSAPP_BUSINESS_ID
              value: {{ .Values.env.bhima_whatsapp_business_id }}
            - name: CAMPAIGN_QUEUED_NOTIFICATION_CRON
              value: "{{ .Values.env.campaign_queued_notification_cron }}"
            - name: CAMPAIGN_NOTIFY_START_DATE
              value: "{{ .Values.env.campaign_notify_start_date }}"
            - name: SESSION_UPDATE_CHUNK_SIZE
              value: "{{ .Values.env.session_update_chunk_size }}"
            - name: SESSION_TYPE_UPDATE_CRON_ENABLED
              value: "{{ .Values.env.session_type_update_cron_enabled }}"
            - name: SESSION_TYPE_UPDATE_CRON
              value: "{{ .Values.env.session_type_update_cron }}"
            - name: SESSION_CHECK_RESELLER_ID
              value: "{{ .Values.env.session_check_reseller_id }}"
            - name: REPORT_CHUNK_SIZE
              value: "{{ .Values.env.report_chunk_size }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            initialDelaySeconds: 30
            httpGet:
              path: /
              port: http
          readinessProbe:
            initialDelaySeconds: 30
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
