# Default values for analytics.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.gitlab.com/greenads-global/ga-analytics-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v2.29.5"

imagePullSecrets:
  - name: "reg-creds-gitlab"
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 5007

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    cert-manager.io/acme-challenge-type: http01
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: onetest.telinfy.com
      paths:
        - path: /gaas(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: onetest-cert-manager-certificate
      hosts:
        - onetest.telinfy.com
resources: {}
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

env:
  port: 5007
  access_token_expiry: 3600
  refresh_token_expiry: 15778476
  # redis
  attempts: 5
  min_delay: 3000
  times_connected: 3

  graph_base_url: https://graph.facebook.com/v12.0
  graph_message_end_url: /messages
  graph_template_end_url: /message_templates
  graph_phone_number_end_url: /phone_numbers

  s3_aws_arn: arn:aws:s3:::telinfy.greenadsglobal.com
  aws_bucket_name: telinfy.greenadsglobal.com
  aws_bucket_region: ap-south-1
  s3_file_base_url: https://s3.ap-south-1.amazonaws.com/telinfy.greenadsglobal.com/reports

  ga_user_account_base_url: http://telinfy-application-user-account.telinfy-application:5000
  get_api_key_end_url: /users/api-key

  # Message count
  message_threshold_for_report: 10

  # mission zero advanced bot configuration id
  mission_zero_bot_configuration_id: 3f9c3615-e9bf-49ef-80c4-0aa5c62384aa

  # oxygen advanced bot configuration id
  oxygen_bot_configuration_id: 057167f5-39ce-4bcb-99b1-bc5f929a1575

  # wonderla chat bot configuration id
  wonderla_bot_configuration_id: 559dba0f-9296-405c-8a5c-6abfd2976a24

  # ps jewellers whatsAppBusinessId
  ps_jewellers_bot_configuration_id: 2f49a654-a286-4826-8be0-196b043ad2ab

  # Enterprise accounts
  enterprise_accounts: "3c8a0376-99dd-4a6d-a8fc-c96e1d6c177a"

  ## Chunk Size
  campaign_message_chunk: 50000

  ## channel prefetch variables
  message_report_v4_prefetch: 5
  conversation_message_report_v4_prefetch: 5
  chatbot_report_prefetch: 5

  # Bhima report cron enabled
  bhima_report_cron_enabled: true
  bhima_whatsapp_business_id: 0f928382-7f3e-41bf-87ee-c981faf83601
  # Campaign notification
  campaign_queued_notification_cron: "*/10 * * * *"
  campaign_notify_start_date: "2025-05-10"

  #session cron
  session_type_update_cron_enabled: true
  session_update_chunk_size: 5000
  session_type_update_cron: "*/10 * * * *"
  session_check_reseller_id: 15

  #report chunk size
  report_chunk_size: 50000
  #email
  from_mail: dev@telinfy.com
nodeSelector: {}

tolerations: []

affinity: {}
