apiVersion: v1
kind: LimitRange
metadata:
  name: test-server-limit-range
  # You can specify a namespace here if you want to apply it to a specific namespace
  # namespace: default
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 250m
      memory: 256Mi
    type: Container
