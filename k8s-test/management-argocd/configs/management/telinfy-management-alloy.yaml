apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telinfy-management-alloy
  namespace: telinfy-argo
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: telinfy-management
  source:
    repoURL: https://github.com/sudhi-greenads/test-ovh-server.git
    path: k8s-test/management-workloads/alloy
    targetRevision: main
    helm:
      valueFiles:
        - telinfy-alloy-values.yaml
  project: telinfy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
