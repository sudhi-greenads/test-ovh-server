apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telinfy-management-kube-prometheus-stack
  namespace: telinfy-argo
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: telinfy-management
  source:
    repoURL: https://github.com/sudhi-greenads/test-ovh-server.git
    path: k8s-test/management-workloads/kube-prometheus-stack
    targetRevision: main
    helm:
      valueFiles:
        - telinfy-kube-prometheus-stack-values.yaml
  project: telinfy
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
